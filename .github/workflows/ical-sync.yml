name: iCal Sync (Supabase)

on:
  schedule:
    - cron: "*/30 * * * *"  # cada 30 minutos (UTC)
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Edge Function sync-ical
        run: |
          curl -sS -X POST "${{ secrets.SUPABASE_SYNC_ICAL_URL }}" \
            -H "Content-Type: application/json" \
            -H "x-ical-cron-token: ${{ secrets.ICAL_CRON_TOKEN }}" \
            --data "{}"
